name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate paths (prevent directory traversal)
        run: |
          for f in dist/*; do
            realpath --relative-to="$(pwd)" "$f" | grep -qE '^\.' && { echo "Suspicious path: $f"; exit 1; }
          done

      - name: Determine prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qE '(a|b|rc)[0-9]+$'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create versioned ZIP
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p release_zips
          cp dist/*.whl "release_zips/BambuCam-${TAG}.whl"
          cp dist/*.tar.gz "release_zips/BambuCam-${TAG}.tar.gz"
          cp dist/*.whl "release_zips/BambuCam-latest.whl"
          cp dist/*.tar.gz "release_zips/BambuCam-latest.tar.gz"

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            release_zips/*
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}

      # Uncomment to publish to PyPI:
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}
