name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate paths (prevent directory traversal)
        run: |
          for f in dist/*; do
            rel="$(realpath --relative-to="$(pwd)" "$f")"
            case "$rel" in
              .*) echo "Suspicious path: $f ($rel)"; exit 1 ;;
            esac
          done

      - name: Determine prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qE '(a|b|rc)[0-9]+$'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage release artifacts
        run: |
          mkdir -p release_zips
          # Keep the wheel's original, PEP 427-compliant filename
          # ({name}-{version}-{pytag}-{abitag}-{platformtag}.whl). pip rejects
          # any renamed wheel ("wrong number of parts"), so it must not be
          # aliased — both the OctoPrint plugin manager and pip parse the name.
          cp dist/*.whl dist/*.tar.gz release_zips/

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            release_zips/*
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}

      # Uncomment to publish to PyPI:
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}
