# https://taskfile.dev

version: "3"

env:
  LOCALES: [] # list your included locales here, e.g. ["de", "fr"]
  TRANSLATIONS: octoprint_bambucam/translations # translations folder, do not touch

vars:
  # Prefer the project venv's pybabel (which has OctoPrint + Jinja2 installed,
  # required by babel.cfg's [jinja2] extension) over a bare PATH pybabel, which
  # may resolve to a system Python without OctoPrint and crash extraction with
  # "ModuleNotFoundError: No module named 'octoprint'". Falls back to PATH
  # pybabel (e.g. in CI, where the venv is activated instead).
  PYBABEL:
    sh: if [ -x ./.venv/bin/pybabel ]; then echo ./.venv/bin/pybabel; else echo pybabel; fi

tasks:
  install:
    desc: Installs the plugin into the current venv
    cmds:
      - "python -m pip install -e .[develop]"

  ### Build related

  build:
    desc: Builds sdist & wheel
    cmds:
      - python -m build --sdist --wheel

  build-sdist:
    desc: Builds sdist
    cmds:
      - python -m build --sdist

  build-wheel:
    desc: Builds wheel
    cmds:
      - python -m build --wheel

  ### Translation related

  babel-new:
    desc: Create a new translation for a locale
    cmds:
      - task: babel-extract
      - |
        {{.PYBABEL}} init --input-file=translations/messages.pot --output-dir=translations --locale="{{ .CLI_ARGS }}"

  babel-extract:
    desc: Update pot file from source
    cmds:
      - '{{.PYBABEL}} extract --mapping-file=babel.cfg --output-file=translations/messages.pot --msgid-bugs-address=i18n@octoprint.org --copyright-holder="The OctoPrint Project" .'

  babel-update:
    desc: Update translation files from pot file
    cmds:
      - for:
          var: LOCALES
        cmd: "{{.PYBABEL}} update --input-file=translations/messages.pot --output-dir=translations --locale={{ .ITEM }}"

  babel-refresh:
    desc: Update translation files from source
    cmds:
      - task: babel-extract
      - task: babel-update

  babel-compile:
    desc: Compile translation files
    cmds:
      - "{{.PYBABEL}} compile --directory=translations"

  babel-bundle:
    desc: Bundle translations
    preconditions:
      - test -d {{ .TRANSLATIONS }}
    cmds:
      - for:
          var: LOCALES
        cmd: |
          locale="{{ .ITEM }}"
          source="translations/${locale}"
          target="{{ .TRANSLATIONS }}/${locale}"

          [ ! -d "${target}" ] || rm -r "${target}"

          echo "Copying translations for locale ${locale} from ${source} to ${target}..."
          cp -r "${source}" "${target}"
